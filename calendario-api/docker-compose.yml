services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-calendario
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: CalendarioLaboral1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sa
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./bd/init-docker.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres-data:
